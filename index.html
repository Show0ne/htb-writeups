<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>HackTheBox Writeups</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
color:#111;
}

.dark{
background:#121212;
color:#ddd;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:350px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar h3{
border-bottom:1px solid #333;
padding-bottom:5px;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:3px 0;
cursor:pointer;
font-size:14px;
}

.sidebar a:hover{
text-decoration:underline;
}

.search{
width:100%;
padding:8px;
margin-bottom:15px;
font-size:14px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.dark .content{
background:#1a1a1a;
}

.viewer pre{
background:#111;
padding:12px;
overflow:auto;
}

.toc{
background:#f0f0f0;
padding:15px;
margin-bottom:25px;
border-radius:5px;
}

.dark .toc{
background:#222;
}

.toc a{
display:block;
text-decoration:none;
color:#0366d6;
}

.toggle{
position:fixed;
top:15px;
right:20px;
padding:6px 10px;
cursor:pointer;
background:#444;
color:white;
border-radius:4px;
font-size:13px;
}

.stats{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙 Theme</div>

<div class="layout">

<div class="sidebar">

<h2>HTB Writeups</h2>

<div class="stats" id="stats"></div>

<input class="search" id="search" placeholder="Search machine">

<h3>Linux</h3>
<div id="linux"></div>

<h3>Windows</h3>
<div id="windows"></div>

</div>

<div class="content">

<div id="viewer" class="viewer">
<h1>HackTheBox Writeups</h1>
<p>Select a machine from the sidebar.</p>
</div>

</div>

</div>

<script>

const repo="Show0ne/htb-writeups";

const difficulties=["Easy","Medium","Hard","Insane"];

const machines={};

async function load(path,container){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const response=await fetch(url);

if(response.status!==200) return;

const files=await response.json();

const sidebar=document.getElementById(container);

const title=document.createElement("div");
title.style.fontWeight="bold";
title.style.marginTop="5px";
title.textContent=path.split("/")[1];

sidebar.appendChild(title);

files
.filter(f=>f.name.endsWith("_writeup.md"))
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(file=>{

const id=file.name.replace("_writeup.md","");

machines[id]=file.download_url;

const a=document.createElement("a");

a.textContent=id;

a.onclick=()=>loadMachine(id);

sidebar.appendChild(a);

});

}

async function loadMachine(id){

const raw=await fetch(machines[id]);

const md=await raw.text();

const html=marked.parse(md);

document.getElementById("viewer").innerHTML=html;

document.querySelectorAll("pre code").forEach(el=>{
hljs.highlightElement(el);
});

}

function toggleTheme(){
document.body.classList.toggle("dark");
}

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

difficulties.forEach(d=>{
load(`Linux/${d}`,"linux");
load(`Windows/${d}`,"windows");
});

</script>

</body>
</html>
