<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>HackTheBox Writeups</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
color:#111;
}

.dark{
background:#121212;
color:#ddd;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:350px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:3px 0;
cursor:pointer;
font-size:14px;
}

.sidebar a:hover{
text-decoration:underline;
}

.search{
width:100%;
padding:8px;
margin-bottom:15px;
font-size:14px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.dark .content{
background:#1a1a1a;
}

.viewer pre{
background:#111;
padding:12px;
overflow:auto;
}

.toggle{
position:fixed;
top:15px;
right:20px;
padding:6px 10px;
cursor:pointer;
background:#444;
color:white;
border-radius:4px;
font-size:13px;
}

.stats{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

.category{
margin-top:15px;
font-weight:bold;
}

</style></head><body><div class="toggle" onclick="toggleTheme()">🌙 Theme</div><div class="layout"><div class="sidebar"><h2>HackTheBox Writeups</h2><div class="stats" id="stats"></div><input class="search" id="search" placeholder="Search machine"><div class="category" id="linuxTitle"></div>
<div id="linux"></div><div class="category" id="windowsTitle"></div>
<div id="windows"></div></div><div class="content"><div id="viewer" class="viewer"><h1>HackTheBox Writeups</h1><p>Collection of HackTheBox machine writeups.</p><p>Select a machine from the sidebar.</p></div></div></div><script>

const repo="Show0ne/htb-writeups";

const machines={};

let linux=[];
let windows=[];

const paths=[
["Linux/Easy","linux"],
["Linux/Medium","linux"],
["Linux/Hard","linux"],
["Linux/Insane","linux"],
["Windows/Easy","windows"],
["Windows/Medium","windows"],
["Windows/Hard","windows"],
["Windows/Insane","windows"]
];

async function load(path,type){

try{

const url=`https://api.github.com/repos/${repo}/contents/${path}`;
const res=await fetch(url);

if(res.status!==200) return;

const files=await res.json();

files
.filter(f=>f.name.endsWith("_writeup.md"))
.forEach(file=>{

const name=file.name.replace("_writeup.md","");

machines[name]=file.download_url;

if(type==="linux") linux.push(name);
if(type==="windows") windows.push(name);

});

updateSidebar();
updateStats();

}catch(e){}

}

function updateSidebar(){

const linuxDiv=document.getElementById("linux");
const windowsDiv=document.getElementById("windows");

linuxDiv.innerHTML="";
windowsDiv.innerHTML="";

linux.sort().forEach(name=>{

const a=document.createElement("a");
a.textContent=name;
a.onclick=()=>loadMachine(name);

linuxDiv.appendChild(a);

});

windows.sort().forEach(name=>{

const a=document.createElement("a");
a.textContent=name;
a.onclick=()=>loadMachine(name);

windowsDiv.appendChild(a);

});

document.getElementById("linuxTitle").textContent=`Linux (${linux.length})`;
document.getElementById("windowsTitle").textContent=`Windows (${windows.length})`;

}

function updateStats(){

document.getElementById("stats").textContent=
Object.keys(machines).length+" writeups in archive";

}

async function loadMachine(name){

const raw=await fetch(machines[name]);
const md=await raw.text();

document.getElementById("viewer").innerHTML=
marked.parse(md);

document.querySelectorAll("pre code").forEach(block=>{
hljs.highlightElement(block);
});

}

function toggleTheme(){

document.body.classList.toggle("dark");

}

paths.forEach(p=>load(p[0],p[1]));

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

a.style.display=
a.textContent.toLowerCase().includes(filter)
? "block"
: "none";

});

});

</script></body>
</html>
