<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>HTB Writeups</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#121212;
color:#ddd;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:350px;
background:#1e1e1e;
padding:20px;
overflow:auto;
}

.sidebar h2{
margin-top:0;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:3px 0;
font-size:14px;
cursor:pointer;
}

.sidebar a:hover{
text-decoration:underline;
}

.section{
margin-top:20px;
border-top:1px solid #333;
padding-top:10px;
font-weight:bold;
}

.search{
width:100%;
padding:8px;
margin:10px 0;
}

.content{
flex:1;
padding:40px;
overflow:auto;
background:#1a1a1a;
}

.toggle{
position:fixed;
top:15px;
right:20px;
cursor:pointer;
background:#444;
padding:6px 10px;
border-radius:4px;
}

</style>

</head>

<body>

<div class="toggle" onclick="toggleTheme()">Theme</div>

<div class="layout">

<div class="sidebar">

<h2>HTB Writeups</h2>

<div id="stats"></div>

<input class="search" id="search" placeholder="Search machine">

<div class="section">Linux Machines</div>

<div id="machines"></div>

</div>

<div class="content">

<div id="viewer">
<h1>HackTheBox Writeups</h1>
<p>Select a machine from the sidebar.</p>
</div>

</div>

</div>

<script>

const repo="Show0ne/htb-writeups";

const machines={};

let linuxCount=0;
let windowsCount=0;

async function loadMachines(){

const dirs=[
"Linux/Easy","Linux/Medium","Linux/Hard","Linux/Insane",
"Windows/Easy","Windows/Medium","Windows/Hard","Windows/Insane"
];

for(const dir of dirs){

try{

const url=`https://api.github.com/repos/${repo}/contents/${dir}`;

const response=await fetch(url);

if(response.status!==200) continue;

const files=await response.json();

files
.filter(f=>f.name.endsWith("_writeup.md"))
.forEach(file=>{

const name=file.name.replace("_writeup.md","");

machines[name]=file.download_url;

const a=document.createElement("a");

a.textContent=name;

a.onclick=()=>loadMachine(name);

document.getElementById("machines").appendChild(a);

if(dir.startsWith("Linux")) linuxCount++;
else windowsCount++;

});

}catch(e){}

}

document.getElementById("stats").innerHTML=
`Linux (${linuxCount})<br>Windows (${windowsCount})`;

}

async function loadMachine(name){

const raw=await fetch(machines[name]);

const md=await raw.text();

document.getElementById("viewer").innerHTML=marked.parse(md);

}

function toggleTheme(){

document.body.classList.toggle("light");

}

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll("#machines a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

loadMachines();

</script>

</body>
</html>
