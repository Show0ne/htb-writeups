<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>HackTheBox Writeups</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
color:#111;
}

.dark{
background:#121212;
color:#ddd;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:350px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:3px 0;
cursor:pointer;
font-size:14px;
}

.sidebar a:hover{
text-decoration:underline;
}

.search{
width:100%;
padding:8px;
margin:10px 0 15px 0;
font-size:14px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.dark .content{
background:#1a1a1a;
}

.viewer pre{
background:#111;
padding:12px;
overflow:auto;
}

.toc{
background:#f0f0f0;
padding:15px;
margin-bottom:25px;
border-radius:5px;
}

.dark .toc{
background:#222;
}

.toc a{
display:block;
text-decoration:none;
color:#0366d6;
}

.toggle{
position:fixed;
top:15px;
right:20px;
padding:6px 10px;
cursor:pointer;
background:#444;
color:white;
border-radius:4px;
font-size:13px;
}

.stats{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

</style></head><body><div class="toggle" onclick="toggleTheme()">🌙 Theme</div><div class="layout"><div class="sidebar"><h2>HackTheBox Writeups</h2><div class="stats" id="stats"></div><input class="search" id="search" placeholder="Search machine"><b>Linux Machines</b>

<div id="machines"></div></div><div class="content"><div id="viewer" class="viewer">
<h1>HackTheBox Writeups</h1>
<p>Select a machine from the sidebar.</p>
</div></div></div><script>

const repo="Show0ne/htb-writeups";

const machines={};

let linuxCount=0;
let windowsCount=0;

async function load(path){

const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const response=await fetch(url);

if(response.status!==200) return;

const files=await response.json();

files
.filter(f=>f.name.endsWith("_writeup.md"))
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(file=>{

const name=file.name.replace("_writeup.md","");

machines[name]=file.download_url;

const a=document.createElement("a");

a.textContent=name;

a.onclick=()=>loadMachine(name);

document.getElementById("machines").appendChild(a);

if(path.startsWith("Linux")) linuxCount++;
if(path.startsWith("Windows")) windowsCount++;

});

updateStats();

}

function updateStats(){

document.getElementById("stats").innerHTML =
`Linux (${linuxCount})<br>Windows (${windowsCount})`;

}

async function loadMachine(name){

const raw=await fetch(machines[name]);

const md=await raw.text();

document.getElementById("viewer").innerHTML =
marked.parse(md);

generateTOC();

document.querySelectorAll("pre code").forEach((block)=>{
hljs.highlightElement(block);
});

window.scrollTo(0,0);

}

function generateTOC(){

const viewer=document.getElementById("viewer");

const headers=viewer.querySelectorAll("h1,h2,h3");

if(headers.length===0) return;

let toc='<div class="toc"><b>Table of Contents</b>';

headers.forEach((h,i)=>{

const id="section_"+i;

h.id=id;

toc+=`<a href="#${id}">${h.innerText}</a>`;

});

toc+='</div>';

viewer.insertAdjacentHTML("afterbegin",toc);

}

function toggleTheme(){

document.body.classList.toggle("dark");

localStorage.setItem("theme",
document.body.classList.contains("dark")?"dark":"light");

}

function loadTheme(){

const saved=localStorage.getItem("theme");

if(saved==="dark"){
document.body.classList.add("dark");
return;
}

if(!saved && window.matchMedia("(prefers-color-scheme: dark)").matches){
document.body.classList.add("dark");
}

}

load("Linux/Easy");
load("Linux/Medium");
load("Linux/Hard");
load("Linux/Insane");

load("Windows/Easy");
load("Windows/Medium");
load("Windows/Hard");
load("Windows/Insane");

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

loadTheme();

</script></body>
</html>
