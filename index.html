<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>HackTheBox Writeups</title><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script><style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f4f4;
color:#111;
}

.dark{
background:#121212;
color:#ddd;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:350px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.sidebar a{
display:block;
color:#9cdcfe;
text-decoration:none;
padding:3px 0;
font-size:14px;
cursor:pointer;
}

.sidebar a:hover{
text-decoration:underline;
}

.category{
margin-top:15px;
font-weight:bold;
}

.subcategory{
margin-left:10px;
margin-top:6px;
font-weight:bold;
color:#ccc;
}

.machine{
margin-left:10px;
}

.search{
width:100%;
padding:8px;
margin-bottom:15px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.dark .content{
background:#1a1a1a;
}

.stats{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

.toggle{
position:fixed;
top:15px;
right:20px;
padding:6px 10px;
cursor:pointer;
background:#444;
color:white;
border-radius:4px;
font-size:18px;
}

</style></head><body><div class="toggle" onclick="toggleTheme()" id="themeToggle">🌙</div><div class="layout"><div class="sidebar"><h2>HackTheBox Writeups</h2><div class="stats" id="stats"></div><input class="search" id="search" placeholder="Search machine"><div id="linux"></div>
<div id="windows"></div></div><div class="content"><div id="viewer"><h1>HackTheBox Writeups</h1>
<p>Select a machine from the sidebar.</p></div></div></div><script>

const repo="Show0ne/htb-writeups";

const structure={
Linux:{},
Windows:{}
};

const difficulties=["Easy","Medium","Hard","Insane"];

const machines={};

async function loadCategory(os,difficulty){

try{

const path=`${os}/${difficulty}`;
const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const res=await fetch(url);

if(res.status!==200) return;

const files=await res.json();

files
.filter(f=>f.name.endsWith("_writeup.md"))
.forEach(file=>{

const name=file.name.replace("_writeup.md","");

machines[name]=file.download_url;

if(!structure[os][difficulty])
structure[os][difficulty]=[];

structure[os][difficulty].push(name);

});

renderSidebar();
updateStats();

}catch(e){}

}

function renderSidebar(){

["Linux","Windows"].forEach(os=>{

const container=document.getElementById(os.toLowerCase());
container.innerHTML="";

let total=0;

Object.keys(structure[os]).forEach(diff=>{
total+=structure[os][diff].length;
});

const title=document.createElement("div");
title.className="category";
title.textContent=`${os} (${total})`;

container.appendChild(title);

Object.keys(structure[os]).forEach(diff=>{

const list=structure[os][diff];

if(!list || list.length===0) return;

const sub=document.createElement("div");
sub.className="subcategory";
sub.textContent=`${diff} (${list.length})`;

container.appendChild(sub);

list.sort().forEach(name=>{

const a=document.createElement("a");

a.textContent=name;
a.className="machine";

a.onclick=()=>loadMachine(name);

container.appendChild(a);

});

});

});

}

function updateStats(){

document.getElementById("stats").textContent=
Object.keys(machines).length+" writeups in archive";

}

async function loadMachine(name){

const raw=await fetch(machines[name]);
const md=await raw.text();

document.getElementById("viewer").innerHTML=
marked.parse(md);

document.querySelectorAll("pre code").forEach(block=>{
hljs.highlightElement(block);
});

}

function toggleTheme(){

document.body.classList.toggle("dark");

const icon=document.getElementById("themeToggle");

if(document.body.classList.contains("dark")){
icon.textContent="☀️";
localStorage.setItem("theme","dark");
}else{
icon.textContent="🌙";
localStorage.setItem("theme","light");
}

}

function loadTheme(){

const saved=localStorage.getItem("theme");
const icon=document.getElementById("themeToggle");

if(saved==="dark"){
document.body.classList.add("dark");
icon.textContent="☀️";
}else{
icon.textContent="🌙";
}

}

["Linux","Windows"].forEach(os=>{
difficulties.forEach(diff=>{
loadCategory(os,diff);
});
});

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".machine").forEach(a=>{

a.style.display=
a.textContent.toLowerCase().includes(filter)
?"block":"none";

});

});

loadTheme();

</script></body>
</html>
