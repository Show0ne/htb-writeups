<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HTB Writeups</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
color:#111;
transition:0.3s;
}

.dark{
background:#121212;
color:#ddd;
}

.light{
background:#f4f4f4;
color:#111;
}

.layout{
display:flex;
height:100vh;
}

.sidebar{
width:320px;
background:#1e1e1e;
color:white;
overflow:auto;
padding:20px;
}

.light .sidebar{
background:#eeeeee;
color:#111;
}

.sidebar a{
display:block;
color:#9cdcfe;
padding:3px 0;
cursor:pointer;
text-decoration:none;
font-size:14px;
}

.light .sidebar a{
color:#0066cc;
}

.sidebar a:hover{
text-decoration:underline;
}

.section{
margin-top:15px;
font-weight:bold;
}

.machine{
margin-left:10px;
}

.search{
width:100%;
padding:8px;
margin-bottom:10px;
}

.content{
flex:1;
overflow:auto;
padding:40px;
background:white;
}

.dark .content{
background:#1a1a1a;
}

.toggle{
position:fixed;
top:15px;
right:20px;
background:#444;
color:white;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body class="dark">

<div class="toggle" onclick="toggleTheme()">Theme</div>

<div class="layout">

<div class="sidebar">

<h2>HTB Writeups</h2>

<input class="search" id="search" placeholder="Search machine">

<div id="sidebar"></div>

</div>

<div class="content">

<div id="viewer">
<h1>HackTheBox Writeups</h1>
<p>Select a machine from the sidebar.</p>
</div>

</div>

</div>

<script>

const repo="Show0ne/htb-writeups";

const osList=["Linux","Windows"];
const difficulties=["Easy","Medium","Hard","Insane"];

const machines={};

async function loadMachines(){

const sidebar=document.getElementById("sidebar");

for(const os of osList){

const osTitle=document.createElement("div");
osTitle.className="section";
osTitle.textContent=os;

sidebar.appendChild(osTitle);

for(const diff of difficulties){

const path=`${os}/${diff}`;

try{

const url=`https://api.github.com/repos/${repo}/contents/${path}`;

const response=await fetch(url);

if(response.status!==200) continue;

const files=await response.json();

const writeups=files.filter(f=>f.name.endsWith("_writeup.md"));

if(writeups.length===0) continue;

const diffTitle=document.createElement("div");

diffTitle.className="machine";
diffTitle.style.fontWeight="bold";
diffTitle.textContent=diff;

sidebar.appendChild(diffTitle);

writeups
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(file=>{

const id=file.name.replace("_writeup.md","");

machines[id]=file.download_url;

const a=document.createElement("a");

a.className="machine";

a.textContent=id;

a.onclick=()=>loadMachine(id);

sidebar.appendChild(a);

});

}catch(e){}

}

}

}

async function loadMachine(id){

const raw=await fetch(machines[id]);

const md=await raw.text();

document.getElementById("viewer").innerHTML=marked.parse(md);

}

function toggleTheme(){

if(document.body.classList.contains("dark")){
document.body.classList.remove("dark");
document.body.classList.add("light");
}else{
document.body.classList.remove("light");
document.body.classList.add("dark");
}

}

document.getElementById("search").addEventListener("input",function(){

const filter=this.value.toLowerCase();

document.querySelectorAll(".sidebar a").forEach(a=>{

const text=a.textContent.toLowerCase();

a.style.display=text.includes(filter)?"block":"none";

});

});

loadMachines();

</script>

</body>
</html>
